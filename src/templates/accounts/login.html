{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    {% include "../base-static/style.html" %}
</head>

<body style="margin: 0; padding: 0; overflow-x: hidden;">
    <section
        style="background-image: url(&quot;{% static 'customerapp/images/backgrounds/face.png' %}&quot;); background-size: cover; background-position: center; position: relative; min-height: 100vh;">
        <!-- Blurred overlay -->
        <div
            style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.4);">
        </div>

        <div class="grid max-w-screen-xl px-4 py-8 mx-auto lg:gap-8 xl:gap-0 lg:py-16 lg:grid-cols-12"
            style="position: relative; z-index: 10;">
            <div class="mr-auto place-self-center lg:col-span-7 ">
                <div class="mb-10">
                    <h1
                        class="max-w-2xl mb-4 text-4xl font-extrabold tracking-tight leading-none text-white md:text-5xl xl:text-6xl">
                        Welcome Back, Login And Let's Go!</h1>
                    <p
                        class="max-w-2xl mb-6 font-light text-white lg:mb-8 md:text-lg lg:text-xl">
                    </p>
                </div>
                {% include "components/messages.html" %}
                <div class="mt-10">
                    <form method="post" action="{% url 'accounts:login_face' %}">
                        {% csrf_token %}
                        <button type="submit"
                            class="text-white bg-gradient-to-r from-teal-400 via-teal-500 to-teal-600 hover:bg-gradient-to-br focus:ring-4 focus:outline-none focus:ring-teal-300 dark:focus:ring-teal-800 font-medium rounded-lg text-xl px-5 py-2.5 text-center">
                            Login Now
                        </button>
                    </form>
                </div>
            </div>
            <div class="hidden lg:mt-0 lg:col-span-5 lg:flex">
                <img src="{% static 'icons/3562336.png' %}" alt="mockup" style="filter: invert(1) brightness(1000%);">
            </div>
        </div>
    </section>
    {% if request.GET.auto_register == "1" %}
    <script>
        setTimeout(function () {
            window.location.href = "{% url 'accounts:register' %}";
        }, 3000);
    </script>
    {% endif %}
    {% include '../base-static/scripts.html' %}
</body>

</html>
