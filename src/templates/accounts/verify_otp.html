{% extends '../base.html' %}
{% block title %}Verify OTP{% endblock %}

{% block content %}
<section class="bg-white dark:bg-gray-900">
    <div class="py-8 px-4 mx-auto max-w-md lg:py-8 text-center">

        <h2 class="mb-6 text-3xl font-bold text-primary-800 dark:text-white">
            Verify OTP
        </h2>

        <p class="mb-4 text-gray-500">
            Enter the OTP sent to your email
        </p>

        {% include "components/messages.html" %}

        <form method="POST">
            {% csrf_token %}

            <input 
                type="text" 
                name="otp" 
                placeholder="Enter 6-digit OTP"
                class="w-full p-3 text-center text-lg border rounded-lg focus:ring-2 focus:ring-blue-500"
                required
            >

            <button type="submit"
                class="mt-6 w-full text-white bg-gradient-to-br from-purple-600 to-blue-500 
                hover:bg-gradient-to-bl focus:ring-4 focus:outline-none focus:ring-blue-300 
                font-medium rounded-lg text-sm px-5 py-2.5">
                Verify OTP
            </button>
           
        </form>

    </div>
</section>
{% endblock %}
